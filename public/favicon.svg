<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="20" fill="#0a0a0f"/>
  <!-- Rings -->
  <circle cx="50" cy="50" r="32" stroke="#6366f1" stroke-width="1.5" fill="none" opacity="0.4"/>
  <circle cx="50" cy="50" r="22" stroke="#818cf8" stroke-width="1.2" fill="none" opacity="0.6"/>
  <circle cx="50" cy="50" r="12" stroke="#818cf8" stroke-width="1" fill="none" opacity="0.7"/>
  <!-- Crosshair -->
  <line x1="50" y1="14" x2="50" y2="35" stroke="url(#g)" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="50" y1="65" x2="50" y2="86" stroke="url(#g)" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="14" y1="50" x2="35" y2="50" stroke="url(#g)" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="65" y1="50" x2="86" y2="50" stroke="url(#g)" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="50" cy="50" r="3" fill="url(#g)"/>
</svg>
