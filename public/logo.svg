<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <radialGradient id="pulse" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#6366f1" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background circle glow -->
  <circle cx="256" cy="256" r="240" fill="url(#pulse)"/>

  <!-- Outer ring -->
  <circle cx="256" cy="256" r="160" stroke="url(#ring)" stroke-width="3" fill="none" opacity="0.4"/>

  <!-- Middle ring -->
  <circle cx="256" cy="256" r="110" stroke="url(#glow)" stroke-width="2.5" fill="none" opacity="0.6"/>

  <!-- Inner ring -->
  <circle cx="256" cy="256" r="60" stroke="url(#glow)" stroke-width="2" fill="none" opacity="0.8"/>

  <!-- Crosshair lines -->
  <!-- Top -->
  <line x1="256" y1="76" x2="256" y2="186" stroke="url(#glow)" stroke-width="3" stroke-linecap="round"/>
  <!-- Bottom -->
  <line x1="256" y1="326" x2="256" y2="436" stroke="url(#glow)" stroke-width="3" stroke-linecap="round"/>
  <!-- Left -->
  <line x1="76" y1="256" x2="186" y2="256" stroke="url(#glow)" stroke-width="3" stroke-linecap="round"/>
  <!-- Right -->
  <line x1="326" y1="256" x2="436" y2="256" stroke="url(#glow)" stroke-width="3" stroke-linecap="round"/>

  <!-- Corner accent marks (NW, NE, SW, SE) -->
  <path d="M148 148 L148 128 L168 128" stroke="#818cf8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.5"/>
  <path d="M364 148 L364 128 L344 128" stroke="#818cf8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.5"/>
  <path d="M148 364 L148 384 L168 384" stroke="#818cf8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.5"/>
  <path d="M364 364 L364 384 L344 384" stroke="#818cf8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.5"/>

  <!-- Center dot -->
  <circle cx="256" cy="256" r="8" fill="url(#glow)" filter="url(#shadow)"/>

  <!-- Hunter figure silhouette (stylized person with stealth pose) -->
  <!-- Head -->
  <circle cx="256" cy="216" r="18" fill="url(#glow)" opacity="0.9"/>
  <!-- Body -->
  <path d="M256 234 L256 290" stroke="url(#glow)" stroke-width="5" stroke-linecap="round" opacity="0.9"/>
  <!-- Left arm reaching forward -->
  <path d="M256 252 L228 240 L210 250" stroke="url(#glow)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.9"/>
  <!-- Right arm extended back -->
  <path d="M256 252 L282 262 L300 254" stroke="url(#glow)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.9"/>
  <!-- Left leg -->
  <path d="M256 290 L236 320" stroke="url(#glow)" stroke-width="4.5" stroke-linecap="round" opacity="0.9"/>
  <!-- Right leg -->
  <path d="M256 290 L276 318" stroke="url(#glow)" stroke-width="4.5" stroke-linecap="round" opacity="0.9"/>
</svg>
